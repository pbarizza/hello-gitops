apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:  # ✅ FIXED: was "meta" (missing colon)
  name: hello-gitops          # ← ArgoCD app name
  namespace: argocd           # ← ArgoCD installation namespace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # 🔗 SOURCE: Git repo and path
  source:
    repoURL: https://github.com/pbarizza/gitops-evaluation.git
    targetRevision: main
    path: k8s/production
    kustomize:
      # ✅ Optional: initial image override (Tekton/ArgoCD Image Updater will update this)
      images:
        - hello-gitops=ndregistry-registry.ap-southeast-1.cr.aliyuncs.com/pbarizza/hello-gitops:latest
  
  # 🎯 DESTINATION: Cluster and namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-gitops   # ← Target namespace (will be auto-created)
  
  # ⚙️ SYNC POLICY: Auto-sync with self-heal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # 📜 REVISION HISTORY
  revisionHistoryLimit: 10

