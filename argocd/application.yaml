apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-gitops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  # 🤖 ArgoCD Image Updater Annotations for Auto-Tag Sync
  annotations:
    argocd-image-updater.argoproj.io/image-list: hello-gitops=cri-la2ldabr2cf5lgpx.registry.ap-southeast-1.cr.aliyuncs.com/pbarizza/hello-gitops
    argocd-image-updater.argoproj.io/hello-gitops.update-strategy: latest
    argocd-image-updater.argoproj.io/hello-gitops.allow-tags: regexp:^v[0-9]+\.[0-9]+-flashy$
spec:
  project: default
  
  # 🔗 SOURCE: Git repo & Kustomize path
  source:
    repoURL: https://github.com/pbarizza/gitops-evaluation.git
    targetRevision: main
    path: k8s/production
    kustomize:
      # Initial sync image (Updater will overwrite this automatically)
      images:
        - hello-gitops=cri-la2ldabr2cf5lgpx.registry.ap-southeast-1.cr.aliyuncs.com/pbarizza/hello-gitops:v1.1-flashy
  
  # 🎯 DESTINATION: Cluster & Namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-gitops
  
  # ⚙️ SYNC POLICY: Automated GitOps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # 📜 REVISION HISTORY
  revisionHistoryLimit: 10

