apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
  - ../base
namePrefix: prod-
commonLabels:
  environment: production
patches:
  - target:
      kind: Deployment
      name: gitops-poc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "1.0.0"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "production"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
images:
  - name: gitops-poc
    newName: registry.ap-southeast-1.aliyuncs.com/your-namespace/gitops-poc
    newTag: latest  # ← Will be updated by Tekton/ArgoCD Image Updater

