apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
namePrefix: prod-
labels:  # ✅ Use 'labels' instead of 'commonLabels'
  - pairs:
      environment: production
    includeSelectors: true
patches:
  - target:
      kind: Deployment
      name: gitops-poc
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
