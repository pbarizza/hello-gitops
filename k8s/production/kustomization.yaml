apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
namePrefix: prod-
labels:
  - pairs:
      environment: production
    includeSelectors: true
patches:
  # ✅ Expose via IPv6 LoadBalancer
  - target:
      kind: Service
      name: hello-gitops
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /metadata/annotations
        value:
          service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: "dualstack"
          service.beta.kubernetes.io/alibaba-cloud-loadbalancer-ipv6-internet-bandwidth: "5"
  # ✅ Production scaling & resource adjustments
  - target:
      kind: Deployment
      name: hello-gitops
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "production"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
# ✅ Kustomize overrides the base image placeholder
images:
  - name: hello-gitops
    newName: rndregistry-registry.ap-southeast-1.cr.aliyuncs.com/pbarizza/hello-gitops 
    newTag: v1.1-flashy

