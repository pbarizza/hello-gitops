# k8s/base/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:  
  name: gitops-poc
  labels:
    app: gitops-poc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-poc
  template:
    metadata:
      labels:
        app: gitops-poc
    spec:
      containers:
      - name: app
        image: gitops-poc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: APP_VERSION
          value: "1.0.0"
